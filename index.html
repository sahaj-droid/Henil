<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivi AI — Standalone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-app: #131314; --bg-side: #1e1f20; --bg-msg-user: #2b2c2f; --bg-msg-nivi: transparent;
      --accent: #4285f4; --text: #e3e3e3; --text-sub: #b4b4b4; --border: #444746;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 300px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
    .sidebar-brand { font-size: 22px; font-weight: 600; padding: 10px; margin-bottom: 20px; color: var(--accent); font-family: var(--font-mono); }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }
    .data-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
    .data-item { padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; color: var(--text-sub); transition: 0.2s; font-family: var(--font-mono); }
    .data-item:hover { background: #2e2f30; color: #fff; }

    /* MAIN CHAT */
    .main-workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
    .chat-container { flex: 1; overflow-y: auto; padding: 30px 15% 150px 15%; display: flex; flex-direction: column; scroll-behavior: smooth; }
    
    .msg-row { display: flex; margin-bottom: 32px; width: 100%; }
    .msg-row.user-row { justify-content: flex-end; }
    .msg-row.nivi-row { justify-content: flex-start; }
    .bubble { max-width: 85%; line-height: 1.6; font-size: 15px; position: relative; font-family: var(--font-mono); }
    .user-row .bubble { background: var(--bg-msg-user); padding: 12px 20px; border-radius: 20px; }
    .nivi-row .bubble { background: var(--bg-msg-nivi); padding: 0; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 15px; }
    .nivi-avatar { background: linear-gradient(135deg, #4285f4, #9b72cb); color: white; font-size: 14px; }

    /* INPUT */
    .input-wrapper { position: absolute; bottom: 30px; left: 0; right: 0; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
    .input-pill { width: 100%; background: #1e1f20; border-radius: 32px; padding: 10px 24px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.2s; }
    .input-pill:focus-within { border-color: #5f6368; background: #28292a; }
    .main-textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; padding: 10px 0; resize: none; max-height: 200px; font-family: var(--font-mono); }
    .action-btn { background: transparent; border: none; color: var(--text); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .action-btn:hover { background: #3c4043; }
    .stop-btn { color: #ea4335; display: none; }

    /* MODAL */
    .modal { display: none; position: fixed; z-index: 100; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-side); padding: 25px; border-radius: 20px; width: 550px; border: 1px solid var(--border); position: relative; }
    .close-x { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; color: var(--text-sub); transition: 0.2s; }
    .close-x:hover { color: #fff; }
    .setting-input { width: 100%; background: #131314; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin: 0; font-family: var(--font-mono); font-size: 13px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">NIVI AI</div>
    <button onclick="clearChat()" style="background:#2b2c2f; border:none; color:white; padding:12px; border-radius:30px; cursor:pointer; font-weight:500; margin-bottom:10px;">+ New Chat</button>

    <div class="section-label">Active Model Chain</div>
    <div id="modelList" class="data-list"></div>

    <div class="section-label">Knowledge Base (Files)</div>
    <div id="fileList" class="data-list"></div>

    <div class="section-label">Recent History</div>
    <div id="chatHistory" class="data-list"></div>

    <div style="margin-top:auto; padding-top:10px; border-top:1px solid var(--border);">
      <div class="data-item" onclick="openSettings()">⚙️ Settings & Models</div>
    </div>
  </div>

  <div class="main-workspace">
    <div class="chat-container" id="chatWindow">
      <div id="heroSection" style="margin-top: 15vh;">
        <h1 style="font-size: 48px; font-weight: 500; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hello, dost</h1>
        <h2 style="font-size: 48px; font-weight: 500; color: #444746;">How can I help you?</h2>
      </div>
    </div>

    <div class="input-wrapper">
      <div id="filePreview" style="display:none; color:var(--accent); font-size:12px; margin-bottom:8px; align-self:flex-start; padding-left:24px; font-family:var(--font-mono);"></div>
      <div class="input-pill">
        <button class="action-btn" title="Attach File" onclick="document.getElementById('fileInp').click()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInp" style="display:none" onchange="handleFileSelect(this)">
        
        <textarea id="mainInput" class="main-textarea" placeholder="Enter a prompt here" rows="1" onkeydown="handleKey(event)"></textarea>
        
        <button id="stopBtn" class="action-btn stop-btn" onclick="stopGeneration()" title="Stop Generating">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        </button>

        <button id="sendBtn" class="action-btn" style="color: var(--accent);" onclick="handleSend()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p style="font-size: 11px; color: var(--text-sub); margin-top: 12px;">Nivi respects your privacy. All files and keys stay in your LocalStorage.</p>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <span class="close-x" onclick="toggleModal(false)">✕</span>
      <h3 style="margin-bottom:15px; color:var(--accent); font-family:var(--font-mono);">⚙️ AI Providers & Model Chain</h3>
      <p style="font-size: 11px; color: var(--text-sub); margin-bottom: 20px;">Nivi uses the first model. If it fails, it auto-switches to the next.</p>
      
      <div id="modelChainContainer" style="max-height: 40vh; overflow-y: auto; padding-right: 5px; margin-bottom: 15px;"></div>

      <button onclick="addModelRow()" style="background:transparent; border: 1px dashed var(--border); color: var(--text-sub); padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-family: var(--font-mono); transition: 0.2s;" onmouseover="this.style.color='#fff'; this.style.borderColor='#fff'" onmouseout="this.style.color='var(--text-sub)'; this.style.borderColor='var(--border)'">
        ➕ Add New Model to Chain
      </button>

      <button onclick="saveSettings()" style="width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold;">💾 Save Configuration</button>
    </div>
  </div>

  <script src="nivi.js"></script>
  <script src="gemini.js"></script>
  <script>
    // --- UI & Event Handlers ---
    window.onload = () => { renderSidebarData(); restoreChat(); };

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    }

    function toggleGenerating(isGen) {
      document.getElementById('stopBtn').style.display = isGen ? 'flex' : 'none';
      document.getElementById('sendBtn').style.display = isGen ? 'none' : 'flex';
      window.AppState._isGenerating = isGen;
    }

    function stopGeneration() {
      toggleGenerating(false);
      window.AppState._abortController = true;
    }

    function clearChat() {
      AppState._tabChatHistory = [];
      localStorage.removeItem('niviTabChat');
      document.getElementById('chatWindow').innerHTML = `<div id="heroSection" style="margin-top: 15vh;"><h1 style="font-size: 48px; font-weight: 500; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hello, dost</h1><h2 style="font-size: 48px; font-weight: 500; color: #444746;">How can I help you?</h2></div>`;
      renderSidebarData();
    }

    // --- Settings Modal Logic ---
    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
    
    function openSettings() {
      const container = document.getElementById('modelChainContainer');
      container.innerHTML = '';
      let chain = [];
      try { chain = JSON.parse(localStorage.getItem('nivi_model_chain') || '[]'); } catch(e) {}
      if (chain.length === 0) addModelRow({ provider: 'gemini', model: '', key: '', url: '' });
      else chain.forEach(config => addModelRow(config));
      toggleModal(true);
    }

    function addModelRow(config = { provider: 'gemini', model: '', key: '', url: '' }) {
      const container = document.getElementById('modelChainContainer');
      const row = document.createElement('div');
      row.className = 'model-config-row';
      row.style.cssText = 'background: #1a1a1c; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; position: relative; display: flex; flex-direction: column; gap: 10px;';
      row.innerHTML = `
        <span onclick="this.parentElement.remove()" style="position:absolute; top:12px; right:15px; color:#ea4335; cursor:pointer; font-weight:bold; font-size:16px;" title="Remove Model">✕</span>
        <div style="display: flex; gap: 10px; padding-right: 20px;">
          <select class="conf-provider setting-input" style="flex: 1; cursor:pointer;">
            <option value="gemini" ${config.provider === 'gemini' ? 'selected' : ''}>Gemini</option>
            <option value="openrouter" ${config.provider === 'openrouter' ? 'selected' : ''}>OpenRouter</option>
            <option value="groq" ${config.provider === 'groq' ? 'selected' : ''}>Groq</option>
            <option value="nvidia" ${config.provider === 'nvidia' ? 'selected' : ''}>Nvidia</option>
          </select>
          <input type="text" class="conf-model setting-input" placeholder="Model Name" value="${config.model}" style="flex: 2;">
        </div>
        <input type="password" class="conf-key setting-input" placeholder="API Key" value="${config.key}">
        <input type="text" class="conf-url setting-input" placeholder="API Link (Optional)" value="${config.url || ''}" style="font-size:11px; color:var(--text-sub);">
      `;
      container.appendChild(row);
    }

    function saveSettings() {
      const rows = document.querySelectorAll('.model-config-row');
      const chain = [];
      rows.forEach(row => {
        const provider = row.querySelector('.conf-provider').value;
        const model = row.querySelector('.conf-model').value.trim();
        const key = row.querySelector('.conf-key').value.trim();
        const url = row.querySelector('.conf-url').value.trim();
        if (model || key) chain.push({ provider, model, key, url });
      });
      localStorage.setItem('nivi_model_chain', JSON.stringify(chain));
      toggleModal(false);
      renderSidebarData();
    }
  </script>
</body>
</html>
