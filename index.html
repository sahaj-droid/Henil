<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivi AI — Premium Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #131314; --bg-sidebar: #1e1f20; --bg-hover: #2e2f30;
      --text-main: #e3e3e3; --text-sub: #b4b4b4;
      --accent-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
      --border: #444746; --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
    
    /* SIDEBAR */
    .sidebar { width: 280px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 12px; border-right: 1px solid var(--border); }
    .brand { font-size: 24px; font-weight: 500; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 10px; font-family: var(--font-mono); }
    .new-chat-btn { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1a1a1c; border: 1px solid var(--border); border-radius: 50px; color: var(--text-sub); cursor: pointer; margin: 20px 0; font-weight: 500; }
    .history-list { flex: 1; overflow-y: auto; font-size: 14px; }
    
    /* MAIN CONTENT */
    .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    .chat-window { flex: 1; overflow-y: auto; padding: 20px 15% 120px; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
    .hero { margin-top: 10vh; text-align: left; }
    .greeting { font-size: 56px; font-weight: 500; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* INPUT AREA */
    .input-area { position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
    .input-pill { width: 100%; background: #1e1f20; border-radius: 32px; padding: 8px 24px; display: flex; align-items: center; gap: 16px; border: 1px solid transparent; }
    .main-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; padding: 12px 0; resize: none; font-family: var(--font-mono); }
    
    /* SETTINGS MODAL */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-sidebar); padding: 30px; border-radius: 24px; width: 500px; border: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
    .model-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; }
    .remove-btn { position: absolute; top: 10px; right: 10px; color: #ff4d4d; cursor: pointer; font-size: 18px; }
    .add-btn { width: 100%; padding: 12px; border-radius: 12px; background: transparent; border: 1px dashed #4285f4; color: #4285f4; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
    .save-btn { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent-gradient); border: none; color: white; font-weight: 700; cursor: pointer; }
    
    /* CHAT BUBBLES */
    .msg-row { display: flex; gap: 20px; margin-bottom: 10px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .avatar.nivi { background: var(--accent-gradient); color: white; }
    .avatar.user { background: #5c7080; color: white; font-size: 12px; }
    .text-content { font-size: 15px; line-height: 1.7; flex: 1; font-family: var(--font-mono); }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand">NIVI AI</div>
    <button class="new-chat-btn" onclick="window.location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg> New Chat
    </button>
    <div class="history-list" id="sidebarHistory"></div>
    <div style="margin-top:auto;">
      <button class="new-chat-btn" onclick="toggleModal(true)" style="width:100%; justify-content:center; border-color:#4285f4; color:#4285f4;">
        ➕ Add Model / Key
      </button>
    </div>
  </div>

  <div class="main-content">
    <div class="chat-window" id="chatWindow">
      <div class="hero" id="heroSection">
        <div class="greeting">Hello, dost</div>
        <div style="font-size: 56px; font-weight: 500; color: #444746;">How can I help you?</div>
      </div>
    </div>
    <div class="input-area">
      <div id="filePreview" style="display:none; background:#2e2f30; padding:8px 15px; border-radius:12px; font-size:12px; margin-bottom:10px; width:100%; color:#4285f4;"></div>
      <div class="input-pill">
        <button onclick="document.getElementById('fileInp').click()" style="background:none; border:none; color:white; cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInp" style="display:none" onchange="handleFileSelect(this)">
        <textarea id="mainInput" class="main-input" placeholder="Enter a prompt here" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button onclick="handleSend()" style="background:none; border:none; color:#4285f4; cursor:pointer;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <h2 style="margin-bottom:20px;">Model Chain Configuration</h2>
      <div id="modelContainer"></div>
      <button class="add-btn" onclick="addModelRow()">+ Add Another Model (Fallback)</button>
      <div style="display:flex; gap:10px;">
        <button class="save-btn" style="background:#333;" onclick="toggleModal(false)">Cancel</button>
        <button class="save-btn" onclick="saveModelChain()">Save & Deploy</button>
      </div>
    </div>
  </div>

  <script>window.AppState = { wl: [], cache: {}, _tabChatHistory: [], _pendingFile: null };</script>
  <script src="gemini.js"></script>
  <script src="nivi.js"></script>

  <script>
    function toggleModal(show) {
      document.getElementById('settingsModal').style.display = show ? 'flex' : 'none';
      if(show) renderModelRows();
    }

    function addModelRow(data = { provider: 'gemini', model: '', key: '' }) {
      const container = document.getElementById('modelContainer');
      const div = document.createElement('div');
      div.className = 'model-card';
      div.innerHTML = `
        <span class="remove-btn" onclick="this.parentElement.remove()">✕</span>
        <select class="p-prov" style="width:100%; background:#131314; color:white; border:1px solid #444; padding:8px; border-radius:8px; margin-bottom:10px;">
          <option value="gemini" ${data.provider==='gemini'?'selected':''}>Gemini</option>
          <option value="openrouter" ${data.provider==='openrouter'?'selected':''}>OpenRouter</option>
          <option value="nvidia" ${data.provider==='nvidia'?'selected':''}>Nvidia (OpenRouter)</option>
        </select>
        <input type="text" class="p-model" placeholder="Model Name" value="${data.model}" style="width:100%; background:#131314; color:white; border:1px solid #444; padding:8px; border-radius:8px; margin-bottom:10px;">
        <input type="password" class="p-key" placeholder="API Key" value="${data.key}" style="width:100%; background:#131314; color:white; border:1px solid #444; padding:8px; border-radius:8px;">
      `;
      container.appendChild(div);
    }

    function saveModelChain() {
      const chain = [];
      document.querySelectorAll('.model-card').forEach(card => {
        chain.push({
          provider: card.querySelector('.p-prov').value,
          model: card.querySelector('.p-model').value,
          key: card.querySelector('.p-key').value
        });
      });
      localStorage.setItem('nivi_model_chain', JSON.stringify(chain));
      toggleModal(false);
    }

    function renderModelRows() {
      const container = document.getElementById('modelContainer');
      container.innerHTML = '';
      const chain = JSON.parse(localStorage.getItem('nivi_model_chain') || '[]');
      if(chain.length === 0) addModelRow(); else chain.forEach(c => addModelRow(c));
    }

    function handleFileSelect(inp) {
      if(inp.files[0]) {
        AppState._pendingFile = inp.files[0];
        document.getElementById('filePreview').style.display = 'block';
        document.getElementById('filePreview').innerText = "📎 " + inp.files[0].name;
      }
    }

    async function handleSend() {
      const inp = document.getElementById('mainInput');
      const text = inp.value.trim();
      const file = AppState._pendingFile;
      if(!text && !file) return;

      document.getElementById('heroSection')?.remove();
      appendMsg('user', file ? `📎 ${file.name}\n${text}` : text);
      inp.value = ''; inp.style.height = 'auto';
      document.getElementById('filePreview').style.display = 'none';

      const responseId = 'nivi-' + Date.now();
      appendMsg('nivi', 'Thinking...', responseId);

      try {
        if(file) {
          const base64 = await readFileAsBase64(file);
          const mime = file.type || getFileMimeType(file.name);
          AppState._pendingFile = null;
          const r = await directGeminiCallWithFile(text || "Analyze this", base64, mime);
          updateUI(responseId, r.answer);
        } else {
          const history = AppState._tabChatHistory.map(m => ({
            role: m.role==='nivi'?'model':'user', parts:[{text:m.text}]
          }));
          await directGeminiCallStreamMultiTurn(history, text, (chunk) => updateUI(responseId, chunk), true);
        }
      } catch(e) { updateUI(responseId, "⚠️ Chain Error."); }
    }

    function appendMsg(role, text, id) {
      const win = document.getElementById('chatWindow');
      const div = document.createElement('div');
      div.className = 'msg-row';
      div.innerHTML = `<div class="avatar ${role}">${role==='nivi'?'✦':'U'}</div><div class="text-content" id="${id||''}"></div>`;
      win.appendChild(div);
      const target = div.querySelector('.text-content');
      target.innerHTML = role==='nivi' ? _formatNiviResponse(text) : text.replace(/\n/g,'<br>');
      win.scrollTop = win.scrollHeight;
      AppState._tabChatHistory.push({ role, text });
    }

    function updateUI(id, text) {
      const el = document.getElementById(id);
      if(el) el.innerHTML = _formatNiviResponse(text);
      document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
    }
  </script>
</body>
</html>
