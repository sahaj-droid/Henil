<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivi AI — Standalone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-app: #131314; 
      --bg-side: #1e1f20;
      --bg-msg-user: #2b2c2f;
      --bg-msg-nivi: transparent;
      --accent: #4285f4; 
      --text: #e3e3e3;
      --text-sub: #b4b4b4;
      --border: #444746;
      --font-mono: 'JetBrains Mono', monospace; 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

    /* --- SIDEBAR --- */
    .sidebar { width: 300px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
    .sidebar-brand { font-size: 22px; font-weight: 600; padding: 10px; margin-bottom: 20px; color: var(--accent); }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }
    
    .data-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
    .data-item { padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; color: var(--text-sub); transition: 0.2s; }
    .data-item:hover { background: #2e2f30; color: #fff; }

    /* --- MAIN CHAT --- */
    .main-workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
    .chat-container { flex: 1; overflow-y: auto; padding: 30px 15% 150px 15%; display: flex; flex-direction: column; scroll-behavior: smooth; }

    /* Message Alignments */
    .msg-row { display: flex; margin-bottom: 32px; width: 100%; }
    .msg-row.user-row { justify-content: flex-end; } 
    .msg-row.nivi-row { justify-content: flex-start; }

    .bubble { max-width: 85%; line-height: 1.6; font-size: 15px; position: relative; }
    .user-row .bubble { background: var(--bg-msg-user); padding: 12px 20px; border-radius: 20px; font-family: var(--font-mono); }
    .nivi-row .bubble { background: var(--bg-msg-nivi); padding: 0; font-family: var(--font-mono); }
    
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 15px; }
    .nivi-avatar { background: linear-gradient(135deg, #4285f4, #9b72cb); color: white; font-size: 14px; }

    /* --- INPUT AREA --- */
    .input-wrapper { position: absolute; bottom: 30px; left: 0; right: 0; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
    .input-pill { width: 100%; background: #1e1f20; border-radius: 32px; padding: 10px 24px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.2s; }
    .input-pill:focus-within { border-color: #5f6368; background: #28292a; }
    
    .main-textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; padding: 10px 0; resize: none; max-height: 200px; font-family: var(--font-mono); }
    
    .action-btn { background: transparent; border: none; color: var(--text); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .action-btn:hover { background: #3c4043; }
    .stop-btn { color: #ea4335; display: none; }

    /* Modal Styling */
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-side); padding: 25px; border-radius: 20px; width: 450px; border: 1px solid var(--border); position: relative; }
    .close-x { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; color: var(--text-sub); transition: 0.2s; }
    .close-x:hover { color: #fff; }

    /* Settings Inputs */
    .setting-input { width: 100%; background: #131314; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-family: var(--font-mono); font-size: 13px; }
    .save-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">Nivi AI</div>
    <button onclick="window.location.reload()" style="background:#2b2c2f; border:none; color:white; padding:12px; border-radius:30px; cursor:pointer; font-weight:500; margin-bottom:10px;">+ New Chat</button>

    <div class="section-label">Active Model Chain</div>
    <div id="modelList" class="data-list"></div>

    <div class="section-label">Knowledge Base (Files)</div>
    <div id="fileList" class="data-list"></div>

    <div style="margin-top:auto; padding-top:10px; border-top:1px solid var(--border);">
      <div class="data-item" onclick="openSettings()">⚙️ Settings & Models</div>
    </div>
  </div>

  <div class="main-workspace">
    <div class="chat-container" id="chatWindow">
      <div id="heroSection" style="margin-top: 15vh;">
        <h1 style="font-size: 48px; font-weight: 500; background: linear-gradient(90deg, #4285f4, #9b72cb, #d96570); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Hello, dost</h1>
        <h2 style="font-size: 48px; font-weight: 500; color: #444746;">How can I help you?</h2>
      </div>
    </div>

    <div class="input-wrapper">
      <div id="filePreview" style="display:none; color:var(--accent); font-size:12px; margin-bottom:8px; align-self:flex-start; padding-left:24px;"></div>
      <div class="input-pill">
        <button class="action-btn" title="Attach File" onclick="document.getElementById('fileInp').click()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInp" style="display:none" onchange="handleFileSelect(this)">
        
        <textarea id="mainInput" class="main-textarea" placeholder="Enter a prompt here" rows="1" onkeydown="handleKey(event)"></textarea>
        
        <button id="stopBtn" class="action-btn stop-btn" onclick="stopNivi()" title="Stop Generating">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        </button>

        <button id="sendBtn" class="action-btn" style="color: var(--accent);" onclick="handleSend()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p style="font-size: 11px; color: var(--text-sub); margin-top: 12px;">Nivi respects your privacy. All files and keys stay in your LocalStorage.</p>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <span class="close-x" onclick="toggleModal(false)">✕</span>
      <h3 style="margin-bottom:20px;">⚙️ Configuration</h3>
      
      <label style="font-size:12px; color:var(--text-sub);">Gemini API Key</label>
      <input type="password" id="setGeminiKey" class="setting-input" placeholder="AIzaSy...">
      
      <label style="font-size:12px; color:var(--text-sub);">OpenRouter API Key</label>
      <input type="password" id="setOrKey" class="setting-input" placeholder="sk-or-...">
      
      <label style="font-size:12px; color:var(--text-sub);">Model Chain (JSON Array)</label>
      <textarea id="setModelChain" class="setting-input" rows="3" placeholder='[{"provider":"gemini","model":"gemini-3.1-flash"}]'></textarea>
      
      <button onclick="saveSettings()" class="save-btn">Save Settings</button>
    </div>
  </div>

  <script src="nivi.js"></script>
  <script src="gemini.js"></script>
  
  <script>
    // --- 1. Enter Key & UI State ---
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    }

    function toggleGenerating(isGen) {
      document.getElementById('stopBtn').style.display = isGen ? 'flex' : 'none';
      document.getElementById('sendBtn').style.display = isGen ? 'none' : 'flex';
    }

    // --- 2. Message UI & Alignment ---
    function appendMsg(role, text, id) {
      const win = document.getElementById('chatWindow');
      const row = document.createElement('div');
      row.className = `msg-row ${role === 'user' ? 'user-row' : 'nivi-row'}`;
      
      const avatarHtml = role === 'nivi' ? `<div class="avatar nivi-avatar">✦</div>` : '';
      const formattedText = role === 'nivi' ? _formatNiviResponse(text) : text.replace(/\n/g, '<br>');
      const content = `<div class="bubble" id="${id||''}">${formattedText}</div>`;
      
      row.innerHTML = avatarHtml + content;
      win.appendChild(row);
      win.scrollTop = win.scrollHeight;
      
      if(role === 'user') AppState._tabChatHistory.push({ role:'user', text });
    }

    function updateMsg(id, text) {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = _formatNiviResponse(text);
        const win = document.getElementById('chatWindow');
        win.scrollTop = win.scrollHeight;
      }
    }

    // --- 3. File Upload & Memory ---
    function handleFileSelect(inp) {
      if (inp.files && inp.files[0]) {
        AppState._pendingFile = inp.files[0];
        const preview = document.getElementById('filePreview');
        preview.style.display = 'block';
        preview.innerText = `📎 Attached: ${inp.files[0].name}`;
        document.getElementById('mainInput').focus();
      }
    }

    function saveFileToMemory(filename) {
      let files = JSON.parse(localStorage.getItem('nivi_file_memory') || '[]');
      if (!files.find(f => f.name === filename)) {
        files.push({ name: filename });
        localStorage.setItem('nivi_file_memory', JSON.stringify(files));
        renderSidebarData();
      }
    }

    // --- 4. THE REAL SEND FUNCTION ---
    async function handleSend() {
      const inp = document.getElementById('mainInput');
      const text = inp.value.trim();
      const file = AppState._pendingFile;

      if (!text && !file) return;

      const hero = document.getElementById('heroSection');
      if (hero) hero.style.display = 'none';

      const userText = file ? `📎 ${file.name}\n${text}` : text;
      appendMsg('user', userText);
      inp.value = '';
      
      document.getElementById('filePreview').style.display = 'none';
      toggleGenerating(true);

      const resId = 'nivi-' + Date.now();
      appendMsg('nivi', '<span style="color:#666; font-size:12px;">વિચારી રહી છું...</span>', resId);

      try {
        if (file) {
          // File processing via gemini.js
          const base64 = await window.readFileAsBase64(file);
          const r = await window.directGeminiCallWithFile(text || "Analyze this file.", base64, file.type);
          updateMsg(resId, r.answer || "⚠️ No answer received.");
          saveFileToMemory(file.name);
          AppState._pendingFile = null;
          document.getElementById('fileInp').value = ''; 
        } else {
          // Stream Text chat via gemini.js
          const history = AppState._tabChatHistory.map(m => ({ role: m.role==='nivi'?'model':'user', parts:[{text:m.text}] }));
          await window.directGeminiCallStreamMultiTurn(history, text, (chunk) => {
             updateMsg(resId, chunk);
          }, true);
        }
      } catch (err) {
        updateMsg(resId, "⚠️ Connection Error: " + err.message);
      }
      
      const finalHtml = document.getElementById(resId).innerHTML;
      AppState._tabChatHistory.push({ role:'nivi', text: document.getElementById(resId).innerText });
      toggleGenerating(false);
    }

    // --- 5. Settings & Sidebar ---
    function openSettings() {
      document.getElementById('setGeminiKey').value = localStorage.getItem('geminiApiKey') || '';
      document.getElementById('setOrKey').value = localStorage.getItem('openRouterApiKey') || '';
      document.getElementById('setModelChain').value = localStorage.getItem('nivi_model_chain') || '[{"provider":"gemini","model":"gemini-3.1-flash-lite-preview"}]';
      toggleModal(true);
    }

    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }

    function saveSettings() {
      localStorage.setItem('geminiApiKey', document.getElementById('setGeminiKey').value.trim());
      localStorage.setItem('openRouterApiKey', document.getElementById('setOrKey').value.trim());
      try {
        const chainJson = document.getElementById('setModelChain').value.trim();
        JSON.parse(chainJson); // Verify valid JSON
        localStorage.setItem('nivi_model_chain', chainJson);
        toggleModal(false);
        renderSidebarData();
        alert("✅ Settings Saved Successfully!");
      } catch(e) {
        alert("⚠️ Invalid JSON in Model Chain!");
      }
    }

    function renderSidebarData() {
      let models = [];
      try { models = JSON.parse(localStorage.getItem('nivi_model_chain') || '[]'); } catch(e) {}
      if(models.length === 0) models = [{provider: "Gemini", model: "Not Set"}];
      document.getElementById('modelList').innerHTML = models.map(m => `<div class="data-item">📦 ${m.provider}: ${m.model}</div>`).join('');
      
      const files = JSON.parse(localStorage.getItem('nivi_file_memory') || '[]');
      if(files.length > 0) {
        document.getElementById('fileList').innerHTML = files.map(f => `<div class="data-item" title="Saved to memory">📄 ${f.name}</div>`).join('');
      } else {
        document.getElementById('fileList').innerHTML = `<div class="data-item" style="opacity:0.5;">No files yet</div>`;
      }
    }

    window.onload = renderSidebarData;
  </script>
</body>
</html>
