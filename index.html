<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivi AI — Your Universal Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Gemini Style CSS */
    :root {
      --bg-main: #131314;
      --bg-sidebar: #1e1f20;
      --bg-hover: #2e2f30;
      --text-main: #e3e3e3;
      --text-sub: #b4b4b4;
      --accent-gradient: linear-gradient(90deg, #4285f4, #9b72cb, #d96570);
      --border: #444746;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-main); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
    .sidebar { width: 280px; background: var(--bg-sidebar); display: flex; flex-direction: column; padding: 12px; }
    .new-chat-btn { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: #1a1a1c; border: 1px solid var(--border); border-radius: 50px; color: var(--text-sub); font-weight: 500; cursor: pointer; margin: 20px 0 30px; }
    .history-list { flex: 1; overflow-y: auto; }
    .history-item { padding: 10px 16px; border-radius: 50px; font-size: 14px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .history-item:hover { background: var(--bg-hover); }
    .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
    .header { height: 64px; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
    .brand { font-size: 22px; font-weight: 500; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .chat-window { flex: 1; overflow-y: auto; padding: 20px 15% 120px; display: flex; flex-direction: column; gap: 30px; scroll-behavior: smooth; }
    .hero { margin-top: 10vh; }
    .greeting { font-size: 50px; font-weight: 500; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sub-greeting { font-size: 50px; font-weight: 500; color: #444746; }
    .msg-row { display: flex; gap: 20px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: bold; }
    .avatar.nivi { background: var(--accent-gradient); color: white; font-size: 18px; }
    .avatar.user { background: #5c7080; color: white; font-size: 12px; }
    .text-content { font-size: 16px; line-height: 1.6; color: var(--text-main); flex: 1; }
    .input-area { position: absolute; bottom: 20px; left: 0; right: 0; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
    .input-pill { width: 100%; background: #1e1f20; border-radius: 30px; padding: 8px 24px; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; }
    .main-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 16px; padding: 12px 0; resize: none; max-height: 150px; }
    .btn-icon { background: transparent; border: none; color: #fff; cursor: pointer; padding: 8px; border-radius: 50%; display: flex; }
    .btn-icon:hover { background: var(--bg-hover); }

    /* Modal for + Settings */
    .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-sidebar); padding: 30px; border-radius: 20px; width: 450px; border: 1px solid var(--border); }
    .modal-header { font-size: 20px; font-weight: 600; margin-bottom: 25px; color: #fff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 8px; }
    .form-group input { width: 100%; background: #131314; border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: #fff; outline: none; }
    .save-btn { width: 100%; background: var(--accent-gradient); border: none; padding: 14px; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="brand">Nivi</div>
    <button class="new-chat-btn" onclick="window.location.reload()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      New Chat
    </button>
    <div class="history-list" id="sidebarHistory"></div>
    <div style="margin-top:auto;">
      <div class="history-item" onclick="toggleModal(true)" style="color: #4285f4; font-weight: 600;">➕ Add Model / API Key</div>
    </div>
  </div>

  <div class="main-content">
    <div class="header">
      <div id="activeModelLabel" style="font-size: 12px; color: #888;">Gemini 3.1 Flash-Lite</div>
    </div>
    <div class="chat-window" id="chatWindow">
      <div class="hero" id="heroSection">
        <div class="greeting">Hello, dost</div>
        <div class="sub-greeting">How can I help you today?</div>
      </div>
    </div>
    <div class="input-area">
      <div id="filePreview" style="display:none; background:#2e2f30; padding:6px 14px; border-radius:12px; font-size:12px; margin-bottom:10px; width:100%; color:#4285f4; border-left: 3px solid #4285f4;"></div>
      <div class="input-pill">
        <button class="btn-icon" onclick="document.getElementById('fileInp').click()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInp" style="display:none" onchange="handleFileSelect(this)">
        <textarea id="mainInput" class="main-input" placeholder="Enter a prompt here" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="btn-icon" style="color: #4285f4;" onclick="handleSend()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="bottom-info">All processing is local. Your API keys are saved in LocalStorage.</div>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content">
      <div class="modal-header">Settings & Fallback Config</div>
      <div class="form-group"><label>Gemini API Keys</label><input type="text" id="setGemini" placeholder="Key 1, Key 2..."></div>
      <div class="form-group"><label>OpenRouter API Key</label><input type="text" id="setOpenRouter" placeholder="sk-or-..."></div>
      <div class="form-group"><label>OpenRouter Models (Nvidia, etc.)</label><input type="text" id="setORModels" placeholder="nvidia/llama-3.1-405b, etc."></div>
      <button class="save-btn" onclick="saveSettings()">Save & Update Nivi</button>
      <button class="save-btn" style="background:#333; margin-top:8px;" onclick="toggleModal(false)">Cancel</button>
    </div>
  </div>

  <script>
    window.AppState = { wl: [], cache: {}, _tabChatHistory: [], _pendingFile: null };
  </script>
  <script src="gemini.js"></script>
  <script src="nivi.js"></script>

  <script>
    // --- Integration Logic ---
    window.onload = () => {
      document.getElementById('setGemini').value = localStorage.getItem('geminiApiKey') || '';
      document.getElementById('setOpenRouter').value = localStorage.getItem('openRouterApiKey') || '';
      document.getElementById('setORModels').value = localStorage.getItem('openRouterModels') || '';
    };

    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
    function saveSettings() {
      saveApiSettings({ 
        gemini: document.getElementById('setGemini').value,
        openRouter: document.getElementById('setOpenRouter').value,
        openRouterModels: document.getElementById('setORModels').value
      });
      toggleModal(false);
      alert("Nivi Engine Updated!");
    }

    function handleFileSelect(input) {
      const file = input.files[0];
      if(!file) return;
      window.AppState._pendingFile = file;
      const preview = document.getElementById('filePreview');
      preview.style.display = 'block';
      preview.innerText = `📎 Attached: ${file.name}`;
    }

    // 🚀 YOUR ORIGINAL handleSend LOGIC
    async function handleSend() {
      const input = document.getElementById('mainInput');
      const text = input.value.trim();
      const file = window.AppState._pendingFile;

      if(!text && !file) return;

      const hero = document.getElementById('heroSection');
      if(hero) hero.remove();

      // ૧. યુઝરનો મેસેજ UI માં બતાવો
      const displayMsg = file ? `📎 ${file.name}\n${text}` : text;
      appendMsg('user', displayMsg);
      input.value = '';
      input.style.height = 'auto';
      document.getElementById('filePreview').style.display = 'none';

      // ૨. ટાઈપરાઈટર ઈફેક્ટ માટે ખાલી જગ્યા બનાવો
      const responseId = 'nivi-' + Date.now();
      appendMsg('nivi', '', responseId);

      try {
        if(file) {
          // File processing logic using nivi.js
          const base64 = await readFileAsBase64(file);
          const mime = file.type || getFileMimeType(file.name);
          window.AppState._pendingFile = null;
          const r = await directGeminiCallWithFile(text || 'Analyze this file.', base64, mime);
          updateNiviUI(responseId, r.answer);
        } else {
          // Streaming logic
          const history = AppState._tabChatHistory.map(m => ({
            role: m.role === 'nivi' ? 'model' : 'user',
            parts: [{ text: m.text }]
          }));

          await directGeminiCallStreamMultiTurn(history, text, (chunk) => {
            updateNiviUI(responseId, chunk);
          }, true); // true એટલે લાઈવ સર્ચ ચાલુ!
        }
      } catch (err) {
        console.error("Error calling Nivi engine:", err);
        updateNiviUI(responseId, "⚠️ Connection Error. Check console.");
      }
    }

    function appendMsg(role, text, id = null) {
      const win = document.getElementById('chatWindow');
      const row = document.createElement('div');
      row.className = 'msg-row';
      const avatar = `<div class="avatar ${role}">${role==='nivi'?'✦':'U'}</div>`;
      const content = `<div class="text-content" id="${id ? id : ''}">${role==='nivi' ? _formatNiviResponse(text) : escapeHtml(text).replace(/\n/g,'<br>')}</div>`;
      row.innerHTML = avatar + content;
      win.appendChild(row);
      win.scrollTop = win.scrollHeight;
      AppState._tabChatHistory.push({ role, text, ts: Date.now() });
    }

    function updateNiviUI(id, chunk) {
      const target = document.getElementById(id);
      if(target) {
        target.innerHTML = _formatNiviResponse(chunk); // nivi.js function
        document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
      }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  </script>
</body>
</html>
