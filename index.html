<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivi AI — Standalone Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-app: #131314; --bg-side: #1e1f20; --bg-msg-user: #2b2c2f; --bg-msg-nivi: transparent;
      --accent: #4285f4; --text: #e3e3e3; --text-sub: #b4b4b4; --border: #444746;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-app); color: var(--text); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }

    /* SIDEBAR */
    .sidebar { width: 300px; background: var(--bg-side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
    .sidebar-brand { font-size: 22px; font-weight: 600; padding: 10px; margin-bottom: 20px; color: var(--accent); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
    .section-label { font-size: 11px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; margin: 15px 0 8px 10px; letter-spacing: 1px; }
    .data-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
    .data-item { padding: 8px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; color: var(--text-sub); transition: 0.2s; font-family: var(--font-mono); }
    .data-item:hover { background: #2e2f30; color: #fff; }
    .btn-outline { background: transparent; border: 1px dashed var(--border); color: var(--text-sub); width: 100%; padding: 8px; border-radius: 8px; cursor: pointer; font-family: var(--font-mono); font-size: 12px; transition: 0.2s; margin-bottom: 10px; }
    .btn-outline:hover { border-color: #fff; color: #fff; }

    /* MAIN CHAT & HEADER */
    .main-workspace { flex: 1; display: flex; flex-direction: column; position: relative; }
    .chat-header { padding: 12px 15%; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg-side); }
    .project-selector { background: #131314; border: 1px solid var(--border); color: var(--accent); padding: 6px 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 13px; margin-left: 10px; outline: none; cursor: pointer; }
    
    .chat-container { flex: 1; overflow-y: auto; padding: 30px 15% 150px 15%; display: flex; flex-direction: column; scroll-behavior: smooth; }
    .msg-row { display: flex; margin-bottom: 32px; width: 100%; }
    .msg-row.user-row { justify-content: flex-end; }
    .msg-row.nivi-row { justify-content: flex-start; }
    .bubble { max-width: 85%; line-height: 1.6; font-size: 14px; position: relative; font-family: var(--font-mono); }
    .user-row .bubble { background: var(--bg-msg-user); padding: 12px 20px; border-radius: 20px; }
    .nivi-row .bubble { background: var(--bg-msg-nivi); padding: 0; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 15px; }
    .nivi-avatar { background: linear-gradient(135deg, #4285f4, #9b72cb); color: white; font-size: 14px; }

    /* INPUT */
    .input-wrapper { position: absolute; bottom: 30px; left: 0; right: 0; padding: 0 15%; display: flex; flex-direction: column; align-items: center; }
    .input-pill { width: 100%; background: #1e1f20; border-radius: 32px; padding: 10px 24px; display: flex; align-items: center; gap: 15px; border: 1px solid transparent; transition: 0.2s; }
    .input-pill:focus-within { border-color: #5f6368; background: #28292a; }
    .main-textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 15px; padding: 10px 0; resize: none; font-family: var(--font-mono); overflow-y: hidden; max-height: 200px; }
    .action-btn { background: transparent; border: none; color: var(--text); cursor: pointer; padding: 8px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .action-btn:hover { background: #3c4043; }
    .stop-btn { color: #ea4335; display: none; }

    /* MODALS */
    .modal { display: none; position: fixed; z-index: 100; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    .modal-content { background: var(--bg-side); padding: 25px; border-radius: 12px; width: 480px; border: 1px solid var(--border); position: relative; }
    .close-x { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 18px; color: var(--text-sub); transition: 0.2s; }
    .close-x:hover { color: #fff; }
    .setting-input { width: 100%; background: #131314; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-family: var(--font-mono); font-size: 13px; outline: none; }
    .save-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: var(--font-mono); }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-brand">NIVI_PRO</div>
    <button onclick="clearChat()" style="background:#2b2c2f; border:none; color:white; padding:10px; border-radius:30px; cursor:pointer; font-weight:500; margin-bottom:15px; font-family:var(--font-mono); transition:0.2s;" onmouseover="this.style.background='#3c4043'" onmouseout="this.style.background='#2b2c2f'">[+] New Terminal</button>

    <div class="section-label">📁 My Projects</div>
    <div id="projectList" class="data-list" style="max-height: 120px;"></div>
    <button class="btn-outline" onclick="openProjectModal()">+ Create Workspace</button>

    <div class="section-label">📄 Project Files (Knowledge)</div>
    <div id="fileList" class="data-list" style="max-height: 150px;"></div>

    <div class="section-label">💬 Recent History</div>
    <div id="chatHistory" class="data-list"></div>

    <div style="margin-top:auto; padding-top:10px; border-top:1px solid var(--border);">
      <div class="data-item" onclick="openSettings()">⚙️ Settings & Models</div>
    </div>
  </div>

  <div class="main-workspace">
    <div class="chat-header">
      <div style="font-family: var(--font-mono); font-size: 12px; color: var(--text-sub);">
        [ACTIVE_WORKSPACE]: 
        <select id="activeProjectSelect" class="project-selector" onchange="changeActiveProject()">
          <option value="default">/root/default</option>
        </select>
      </div>
      <div style="font-size: 11px; font-family: var(--font-mono); color: #22c55e;" id="syncStatusUI">
        ● Firebase Connected
      </div>
    </div>

    <div class="chat-container" id="chatWindow">
      <div id="heroSection" style="margin-top: 15vh;">
        <h1 style="font-size: 42px; font-weight: 500; background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Nivi Workspace</h1>
        <h2 style="font-size: 16px; font-weight: 400; color: var(--text-sub); font-family: var(--font-mono); margin-top:10px;">Select a project from the top bar to load context.</h2>
      </div>
    </div>

    <div class="input-wrapper">
      <div id="filePreview" style="display:none; color:var(--accent); font-size:11px; margin-bottom:8px; align-self:flex-start; padding-left:24px; font-family:var(--font-mono);"></div>
      <div class="input-pill">
        <button class="action-btn" title="Attach File to Project" onclick="document.getElementById('fileInp').click()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 3.31 2.69 6 6 6s6-2.69 6-6V6h-1.5z"/></svg>
        </button>
        <input type="file" id="fileInp" style="display:none" onchange="handleFileSelect(this)">
        
        <textarea id="mainInput" class="main-textarea" placeholder="> Enter command or prompt..." rows="1" onkeydown="handleKey(event)" oninput="this.style.height='auto'; this.style.height=(this.scrollHeight)+'px';"></textarea>
        
        <button id="stopBtn" class="action-btn stop-btn" onclick="stopGeneration()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
        </button>

        <button id="sendBtn" class="action-btn" style="color: var(--accent);" onclick="handleSend()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="projectModal">
    <div class="modal-content">
      <span class="close-x" onclick="document.getElementById('projectModal').style.display='none'">✕</span>
      <h3 style="margin-bottom:15px; color:var(--text); font-family:var(--font-mono);">📁 Create Workspace</h3>
      <input type="text" id="newProjectName" class="setting-input" placeholder="Project Name (e.g. RealTradePro)">
      <button onclick="createNewProject()" class="save-btn">Initialize Project</button>
    </div>
  </div>

  <div class="modal" id="settingsModal">
    <div class="modal-content" style="width: 550px;">
      <span class="close-x" onclick="toggleModal(false)">✕</span>
      <h3 style="margin-bottom:15px; color:var(--accent); font-family:var(--font-mono);">⚙️ AI Providers & Chain</h3>
      <div id="modelChainContainer" style="max-height: 40vh; overflow-y: auto; padding-right: 5px; margin-bottom: 15px;"></div>
      <button onclick="addModelRow()" class="btn-outline" style="margin-bottom: 15px;">➕ Add New Model to Chain</button>
      <button onclick="saveSettings()" class="save-btn">💾 Save Configuration</button>
    </div>
  </div>

  <script src="nivi.js"></script>
  <script src="gemini.js"></script>
  <script src="firebase-sync.js"></script> 
  <script>
    // ==========================================
    // 1. INITIALIZATION & UI STATE
    // ==========================================
    window.onload = () => {
      renderProjectsUI();
      renderSidebarData();
      restoreChat();
    };

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    }

    function toggleGenerating(isGen) {
      document.getElementById('stopBtn').style.display = isGen ? 'flex' : 'none';
      document.getElementById('sendBtn').style.display = isGen ? 'none' : 'flex';
      if(window.AppState) window.AppState._isGenerating = isGen;
    }

    function stopGeneration() {
      toggleGenerating(false);
      if(window.AppState) window.AppState._abortController = true;
    }

    // ==========================================
    // 2. PROJECT / WORKSPACE LOGIC
    // ==========================================
    function openProjectModal() {
      document.getElementById('projectModal').style.display = 'flex';
      document.getElementById('newProjectName').focus();
    }

    function createNewProject() {
      const pName = document.getElementById('newProjectName').value.trim();
      if(!pName) return alert("Enter project name");
      
      let projs = JSON.parse(localStorage.getItem('nivi_projects') || '[]');
      const projId = 'proj_' + Date.now();
      projs.push({ id: projId, name: pName, files: [] });
      localStorage.setItem('nivi_projects', JSON.stringify(projs));
      
      document.getElementById('projectModal').style.display = 'none';
      document.getElementById('newProjectName').value = '';
      
      renderProjectsUI();
    }

    function renderProjectsUI() {
      const projs = JSON.parse(localStorage.getItem('nivi_projects') || '[]');
      const sidebarList = document.getElementById('projectList');
      const dropdown = document.getElementById('activeProjectSelect');
      
      sidebarList.innerHTML = projs.map(p => `<div class="data-item" onclick="document.getElementById('activeProjectSelect').value='${p.id}'; changeActiveProject();">📁 ${p.name}</div>`).join('');
      
      let options = `<option value="default">/root/default</option>`;
      projs.forEach(p => { options += `<option value="${p.id}">${p.name}</option>`; });
      if (dropdown) dropdown.innerHTML = options;
    }

    function changeActiveProject() {
      const selected = document.getElementById('activeProjectSelect').value;
      console.log("Switched to workspace:", selected);
      // Pachi ahi aape Firebase mathi files pull karavanu logic nakhishu.
    }

    // ==========================================
    // 3. CHAT UI & LOGIC
    // ==========================================
    function clearChat() {
      if (window.AppState && AppState._tabChatHistory && AppState._tabChatHistory.length > 0) {
        let archives = JSON.parse(localStorage.getItem('nivi_chat_archives') || '[]');
        archives.push({ id: Date.now(), chat: AppState._tabChatHistory });
        localStorage.setItem('nivi_chat_archives', JSON.stringify(archives));
      }

      if(window.AppState) AppState._tabChatHistory = [];
      localStorage.setItem('niviTabChat', '[]'); 
      
      document.getElementById('chatWindow').innerHTML = `<div id="heroSection" style="margin-top: 15vh;"><h1 style="font-size: 42px; font-weight: 500; background: linear-gradient(90deg, #4285f4, #9b72cb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Nivi Workspace</h1><h2 style="font-size: 16px; font-weight: 400; color: var(--text-sub); font-family: var(--font-mono); margin-top:10px;">Select a project from the top bar to load context.</h2></div>`;
      renderSidebarData();
    }

    function appendMsg(role, text, id) {
      const win = document.getElementById('chatWindow');
      const hero = document.getElementById('heroSection');
      if (hero) hero.style.display = 'none';

      const row = document.createElement('div');
      row.className = `msg-row ${role === 'user' ? 'user-row' : 'nivi-row'}`;
      
      const avatarHtml = role === 'nivi' ? `<div class="avatar nivi-avatar">✦</div>` : '';
      const formattedText = role === 'nivi' && typeof _formatNiviResponse === 'function' ? _formatNiviResponse(text) : text.replace(/\n/g, '<br>');
      const content = `<div class="bubble" id="${id||''}">${formattedText}</div>`;
      
      row.innerHTML = avatarHtml + content;
      win.appendChild(row);
      win.scrollTop = win.scrollHeight;
    }

    function updateMsg(id, text) {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = typeof _formatNiviResponse === 'function' ? _formatNiviResponse(text) : text;
        const win = document.getElementById('chatWindow');
        win.scrollTop = win.scrollHeight;
      }
    }

    function restoreChat() {
      try {
        const saved = JSON.parse(localStorage.getItem('niviTabChat') || '[]');
        if(saved.length > 0) {
          if(window.AppState) AppState._tabChatHistory = [];
          const hero = document.getElementById('heroSection');
          if (hero) hero.style.display = 'none';
          saved.forEach(msg => {
             appendMsg(msg.role, msg.text);
             if(window.AppState) AppState._tabChatHistory.push(msg);
          });
        }
      } catch(e) {}
    }

    function renderSidebarData() {
      let models = [];
      try { models = JSON.parse(localStorage.getItem('nivi_model_chain') || '[]'); } catch(e) {}
      if(models.length === 0) models = [{provider: "System", model: "Not Set"}];
      document.getElementById('modelList').innerHTML = models.map(m => `<div class="data-item">📦 ${m.provider}: ${m.model || 'Default'}</div>`).join('');
      
      const files = JSON.parse(localStorage.getItem('nivi_file_memory') || '[]');
      if(files.length > 0) {
        document.getElementById('fileList').innerHTML = files.map(f => `<div class="data-item">📄 ${f.name}</div>`).join('');
      } else {
        document.getElementById('fileList').innerHTML = `<div class="data-item" style="opacity:0.5;">No active files</div>`;
      }

      const history = JSON.parse(localStorage.getItem('niviTabChat') || '[]');
      if(history.length > 0) {
        document.getElementById('chatHistory').innerHTML = `<div class="data-item">💬 Last Session (${history.length})</div>`;
      } else {
        document.getElementById('chatHistory').innerHTML = `<div class="data-item" style="opacity:0.5;">No history</div>`;
      }
    }

    async function handleSend() {
      if(window.AppState && AppState._isGenerating) return;
      
      const inp = document.getElementById('mainInput');
      const text = inp.value.trim();
      const file = window.AppState ? AppState._pendingFile : null;

      if (!text && !file) return;

      const userText = file ? `📎 ${file.name}\n${text}` : text;
      appendMsg('user', userText);
      if(window.AppState) {
          AppState._tabChatHistory.push({ role:'user', text: userText });
          localStorage.setItem('niviTabChat', JSON.stringify(AppState._tabChatHistory));
      }
      inp.value = '';
      inp.style.height = 'auto';
      document.getElementById('filePreview').style.display = 'none';
      
      toggleGenerating(true);
      if(window.AppState) AppState._abortController = false;

      const resId = 'nivi-' + Date.now();
      appendMsg('nivi', '<span style="color:var(--text-sub); font-size:13px;">Thinking...</span>', resId);

      try {
        if (file && typeof directGeminiCallWithFile === 'function') {
          const base64 = await window.readFileAsBase64(file);
          const mime = window.getFileMimeType ? window.getFileMimeType(file.name) : file.type;
          const r = await directGeminiCallWithFile(text || "Analyze this file.", base64, mime);
          if(!window.AppState || !AppState._abortController) {
              updateMsg(resId, r.answer || "⚠️ No answer received.");
              if(typeof saveFileToMemory === 'function') saveFileToMemory(file.name);
          }
          if(window.AppState) AppState._pendingFile = null;
          document.getElementById('fileInp').value = ''; 
        } else if (typeof directGeminiCallStreamMultiTurn === 'function') {
          const history = window.AppState ? AppState._tabChatHistory.slice(0, -1).map(m => ({ role: m.role==='nivi'?'model':'user', parts:[{text:m.text}] })) : [];
          await directGeminiCallStreamMultiTurn(history, text, (chunk) => {
             if(!window.AppState || !AppState._abortController) updateMsg(resId, chunk);
          });
        }
      } catch (err) {
        if(!window.AppState || !AppState._abortController) updateMsg(resId, "⚠️ Connection Error: " + err.message);
      }
      
      if(!window.AppState || !AppState._abortController) {
          if(window.AppState) {
             AppState._tabChatHistory.push({ role:'nivi', text: document.getElementById(resId).innerText });
             localStorage.setItem('niviTabChat', JSON.stringify(AppState._tabChatHistory));
          }
      }
      toggleGenerating(false);
      renderSidebarData();
    }

    // ==========================================
    // 4. SETTINGS MODAL LOGIC
    // ==========================================
    function toggleModal(show) { document.getElementById('settingsModal').style.display = show ? 'flex' : 'none'; }
    
    function openSettings() {
      const container = document.getElementById('modelChainContainer');
      container.innerHTML = '';
      let chain = [];
      try { chain = JSON.parse(localStorage.getItem('nivi_model_chain') || '[]'); } catch(e) {}
      if (chain.length === 0) addModelRow({ provider: 'gemini', model: '', key: '', url: '' });
      else chain.forEach(config => addModelRow(config));
      toggleModal(true);
    }

    function addModelRow(config = { provider: 'gemini', model: '', key: '', url: '' }) {
      const container = document.getElementById('modelChainContainer');
      const row = document.createElement('div');
      row.className = 'model-config-row';
      row.style.cssText = 'background: #1a1a1c; border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 10px; position: relative; display: flex; flex-direction: column; gap: 10px;';
      row.innerHTML = `
        <span onclick="this.parentElement.remove()" style="position:absolute; top:12px; right:15px; color:#ea4335; cursor:pointer; font-weight:bold; font-size:16px;" title="Remove Model">✕</span>
        <div style="display: flex; gap: 10px; padding-right: 20px;">
          <select class="conf-provider setting-input" style="flex: 1; margin:0; cursor:pointer;">
            <option value="gemini" ${config.provider === 'gemini' ? 'selected' : ''}>Gemini</option>
            <option value="openrouter" ${config.provider === 'openrouter' ? 'selected' : ''}>OpenRouter</option>
            <option value="groq" ${config.provider === 'groq' ? 'selected' : ''}>Groq</option>
            <option value="nvidia" ${config.provider === 'nvidia' ? 'selected' : ''}>Nvidia</option>
          </select>
          <input type="text" class="conf-model setting-input" placeholder="Model Name" value="${config.model}" style="flex: 2; margin:0;">
        </div>
        <input type="password" class="conf-key setting-input" placeholder="API Key" value="${config.key}" style="margin:0;">
        <input type="text" class="conf-url setting-input" placeholder="API Link (Optional)" value="${config.url || ''}" style="margin:0; font-size:11px; color:var(--text-sub);">
      `;
      container.appendChild(row);
    }

    function saveSettings() {
      const rows = document.querySelectorAll('.model-config-row');
      const chain = [];
      rows.forEach(row => {
        const provider = row.querySelector('.conf-provider').value;
        const model = row.querySelector('.conf-model').value.trim();
        const key = row.querySelector('.conf-key').value.trim();
        const url = row.querySelector('.conf-url').value.trim();
        if (model || key) chain.push({ provider, model, key, url });
      });
      localStorage.setItem('nivi_model_chain', JSON.stringify(chain));
      toggleModal(false);
      renderSidebarData();
    }
  </script>
</body>
</html>
